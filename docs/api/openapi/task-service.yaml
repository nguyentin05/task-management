          type: string
        name:
          type: string
        description:
          type: string
        createdBy:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
