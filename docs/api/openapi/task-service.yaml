components:
  schemas:
    TaskMoveRequest:
      type: object
      properties:
        columnId:
          type: string
        position:
          type: number
          format: double
          minimum: 0.0
      required:
      - columnId
      - position
    ApiResponseTaskResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        result:
          $ref: "#/components/schemas/TaskResponse"
    TaskResponse:
      type: object
      properties:
        id:
          type: string
        columnId:
          type: string
        title:
          type: string
        description:
          type: string
        position:
          type: number
          format: double
        startAt:
          type: string
          format: date-time
        dueAt:
          type: string
          format: date-time
        assigneeId:
          type: string
        label:
          type: string
          enum:
          - RED
          - ORANGE
          - YELLOW
          - GREEN
          - BLUE
          - PURPLE
          - PINK
          - GRAY
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    RoleMemberUpdateRequest:
      type: object
      properties:
        role:
          type: string
          enum:
          - MANAGER
          - MEMBER
      required:
      - role
    ApiResponseProjectMemberResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        result:
          $ref: "#/components/schemas/ProjectMemberResponse"
    ProjectMemberResponse:
      type: object
      properties:
        userId:
          type: string
        role:
          type: string
          enum:
          - MANAGER
          - MEMBER
    TaskAssignRequest:
      type: object
      properties:
        userId:
          type: string
      required:
      - userId
    ProjectCreationRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 0
        description:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
      required:
      - endAt
      - name
      - startAt
    ApiResponseProjectResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        result:
