version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    # Keep update noise low for coursework timeline.
    groups:
      spring-stack:
        patterns:
          - "org.springframework.boot*"
          - "org.springframework.cloud*"
        update-types:
          - "minor"
          - "patch"
      api-docs:
        patterns:
          - "org.springdoc*"
        update-types:
          - "minor"
          - "patch"
      build-tools:
        patterns:
          - "org.projectlombok*"
          - "org.mapstruct*"
          - "com.diffplug*"
        update-types:
          - "minor"
          - "patch"
      database-drivers:
        patterns:
          - "org.postgresql*"
          - "com.h2database*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
