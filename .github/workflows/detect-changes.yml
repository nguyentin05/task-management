name: Detect Changes

on:
  workflow_call:
    inputs:
      head_sha:
        required: false
        type: string
        default: ''
    outputs:
      authentication-service:
        value: ${{ jobs.detect.outputs['authentication-service'] }}
      profile-service:
        value: ${{ jobs.detect.outputs['profile-service'] }}
      task-service:
        value: ${{ jobs.detect.outputs['task-service'] }}
      comment-service:
        value: ${{ jobs.detect.outputs['comment-service'] }}
      notification-service:
        value: ${{ jobs.detect.outputs['notification-service'] }}
      api-gateway:
        value: ${{ jobs.detect.outputs['api-gateway'] }}
      frontend:
        value: ${{ jobs.detect.outputs['frontend'] }}


jobs:
  detect:
    name: Detect file changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      authentication-service: ${{ steps.filter.outputs['authentication-service'] }}
      profile-service: ${{ steps.filter.outputs['profile-service'] }}
      task-service: ${{ steps.filter.outputs['task-service'] }}
      comment-service: ${{ steps.filter.outputs['comment-service'] }}
      notification-service: ${{ steps.filter.outputs['notification-service'] }}
      api-gateway: ${{ steps.filter.outputs['api-gateway'] }}
      frontend: ${{ steps.filter.outputs['frontend'] }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Base and Ref SHAs
        id: shas
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" == "0000000000000000000000000000000000000000" ]; then
              BEFORE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse --root)
            fi
            echo "base=$BEFORE" >> $GITHUB_OUTPUT
            echo "ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.shas.outputs.base }}
          ref: ${{ steps.shas.outputs.ref }}
          filters: |
            authentication-service:
              - 'backend/authentication-service/**'
              - 'backend/pom.xml'
            profile-service:
              - 'backend/profile-service/**'
              - 'backend/pom.xml'
            task-service:
              - 'backend/task-service/**'
              - 'backend/pom.xml'
            comment-service:
              - 'backend/comment-service/**'
              - 'backend/pom.xml'
            notification-service:
              - 'backend/notification-service/**'
              - 'backend/pom.xml'
            api-gateway:
              - 'backend/api-gateway/**'
              - 'backend/pom.xml'
            frontend:
              - 'frontend/**'

      - name: Export changes to JSON
        run: echo '${{ toJSON(steps.filter.outputs) }}' > changes.json

      - name: Upload changes artifact
        uses: actions/upload-artifact@v4
        with:
          name: detected-changes
          path: changes.json
          retention-days: 1