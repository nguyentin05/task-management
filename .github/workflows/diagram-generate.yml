name: Generate Architecture Diagrams

on:
  push:
    paths:
      - 'docs/architecture/c4/structurizr/**'
  workflow_dispatch:

jobs:
  build-diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create output directories
        run: |
          mkdir -p docs/architecture/c4/mermaid
          mkdir -p docs/architecture/c4/plantuml
          mkdir -p docs/architecture/c4/images
          mkdir -p docs/diagrams/sequence

      - name: Export to Mermaid
        uses: docker://structurizr/cli:latest
        with:
          args: export -workspace docs/architecture/c4/structurizr/workspace.dsl -format mermaid -output docs/architecture/c4/mermaid

      - name: Export to PlantUML
        uses: docker://structurizr/cli:latest
        with:
          args: export -workspace docs/architecture/c4/structurizr/workspace.dsl -format plantuml/c4plantuml -output docs/architecture/c4/plantuml

      - name: Export to WebSequenceDiagrams
        uses: docker://structurizr/cli:latest
        with:
          args: export -workspace docs/architecture/c4/structurizr/workspace.dsl -format websequencediagrams -output docs/diagrams/sequence

      - name: Install PlantUML
        run: sudo apt-get install -y plantuml

      - name: Render PNG from PlantUML
        run: |
          plantuml -tpng "docs/architecture/c4/plantuml/*.puml" -o "../images"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "docs: auto-generate architecture diagrams [skip ci]" && \
             git push origin HEAD:${{ github.ref_name }})