name: Generate Architecture Diagrams

on:
  push:
    paths:
      - 'docs/architecture/c4/structurizr/workspace.dsl'
  workflow_dispatch:

jobs:
  build-diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create output directories
        run: |
          mkdir -p docs/architecture/c4/mermaid
          mkdir -p docs/architecture/c4/plantuml
          mkdir -p docs/architecture/c4/images
          mkdir -p docs/diagrams/sequence

      - name: Download Structurizr CLI
        run: |
          URL=$(curl -s https://api.github.com/repos/structurizr/cli/releases/latest | grep browser_download_url | cut -d '"' -f 4 | grep '\.zip')
          wget $URL -O structurizr-cli.zip
          unzip structurizr-cli.zip -d structurizr-cli
          chmod +x structurizr-cli/structurizr.sh

      - name: Install Playwright Dependencies
        run: |
          npm install -g playwright
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Export Text Formats
        run: |
          ./structurizr-cli/structurizr.sh export -workspace docs/architecture/c4/structurizr/workspace.dsl -format mermaid -output docs/architecture/c4/mermaid
          ./structurizr-cli/structurizr.sh export -workspace docs/architecture/c4/structurizr/workspace.dsl -format plantuml/c4plantuml -output docs/architecture/c4/plantuml
          ./structurizr-cli/structurizr.sh export -workspace docs/architecture/c4/structurizr/workspace.dsl -format websequencediagrams -output docs/diagrams/sequence

      - name: Export SVG Images
        run: |
          ./structurizr-cli/structurizr.sh export -workspace docs/architecture/c4/structurizr/workspace.dsl -format svg -output docs/architecture/c4/images

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-generate architecture diagrams [skip ci]" && git push origin master)