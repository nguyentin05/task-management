name: CD

on:
  workflow_run:
    workflows: [ "CI" ]
    branches: [ master ]
    types: [ completed ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  detect-changes:
    name: Read Changes from CI
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      authentication-service: ${{ steps.parse.outputs.authentication-service }}
      profile-service: ${{ steps.parse.outputs.profile-service }}
      task-service: ${{ steps.parse.outputs.task-service }}
      comment-service: ${{ steps.parse.outputs.comment-service }}
      notification-service: ${{ steps.parse.outputs.notification-service }}
      api-gateway: ${{ steps.parse.outputs.api-gateway }}
      frontend: ${{ steps.parse.outputs.frontend }}
    steps:
      - name: Download changes artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: detected-changes
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Parse JSON to variables
        id: parse
        run: |
          if [ ! -f changes.json ]; then
            echo "No changes artifact found, all services unchanged"
            echo "authentication-service=false" >> $GITHUB_OUTPUT
            echo "profile-service=false" >> $GITHUB_OUTPUT
            echo "task-service=false" >> $GITHUB_OUTPUT
            echo "comment-service=false" >> $GITHUB_OUTPUT
            echo "notification-service=false" >> $GITHUB_OUTPUT
            echo "api-gateway=false" >> $GITHUB_OUTPUT
            echo "frontend=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "authentication-service=$(jq -r '.["authentication-service"]' changes.json)" >> $GITHUB_OUTPUT
          echo "profile-service=$(jq -r '.["profile-service"]' changes.json)" >> $GITHUB_OUTPUT
          echo "task-service=$(jq -r '.["task-service"]' changes.json)" >> $GITHUB_OUTPUT
          echo "comment-service=$(jq -r '.["comment-service"]' changes.json)" >> $GITHUB_OUTPUT
          echo "notification-service=$(jq -r '.["notification-service"]' changes.json)" >> $GITHUB_OUTPUT
          echo "api-gateway=$(jq -r '.["api-gateway"]' changes.json)" >> $GITHUB_OUTPUT
          echo "frontend=$(jq -r '.frontend' changes.json)" >> $GITHUB_OUTPUT

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.result == 'success'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: authentication-service
            changed: ${{ needs.detect-changes.outputs['authentication-service'] }}
            context: ./backend
            dockerfile: backend/authentication-service/Dockerfile
          - service: profile-service
            changed: ${{ needs.detect-changes.outputs['profile-service'] }}
            context: ./backend
            dockerfile: backend/profile-service/Dockerfile
          - service: task-service
            changed: ${{ needs.detect-changes.outputs['task-service'] }}
            context: ./backend
            dockerfile: backend/task-service/Dockerfile
          - service: comment-service
            changed: ${{ needs.detect-changes.outputs['comment-service'] }}
            context: ./backend
            dockerfile: backend/comment-service/Dockerfile
          - service: notification-service
            changed: ${{ needs.detect-changes.outputs['notification-service'] }}
            context: ./backend
            dockerfile: backend/notification-service/Dockerfile
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
            context: ./backend
            dockerfile: backend/api-gateway/Dockerfile
          - service: frontend
            changed: ${{ needs.detect-changes.outputs['frontend'] }}
            context: ./frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Skip if not changed
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping build."

      - name: Checkout code
        if: matrix.changed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        if: matrix.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short,value=${{ github.event.workflow_run.head_sha }}

      - name: Build image
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          outputs: type=docker,dest=/tmp/${{ matrix.service }}.tar

      - name: Upload image artifact
        if: matrix.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/${{ matrix.service }}.tar
          retention-days: 1

  push-images:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ detect-changes, build-images ]
    if: always() && needs.build-images.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - authentication-service
          - profile-service
          - task-service
          - comment-service
          - notification-service
          - api-gateway
          - frontend

    steps:
      - name: Check if should push
        id: should-push
        run: |
          SERVICE="${{ matrix.service }}"
          case "$SERVICE" in
            authentication-service) CHANGED="${{ needs.detect-changes.outputs['authentication-service'] }}" ;;
            profile-service)        CHANGED="${{ needs.detect-changes.outputs['profile-service'] }}" ;;
            task-service)           CHANGED="${{ needs.detect-changes.outputs['task-service'] }}" ;;
            comment-service)        CHANGED="${{ needs.detect-changes.outputs['comment-service'] }}" ;;
            notification-service)   CHANGED="${{ needs.detect-changes.outputs['notification-service'] }}" ;;
            api-gateway)            CHANGED="${{ needs.detect-changes.outputs['api-gateway'] }}" ;;
            frontend)               CHANGED="${{ needs.detect-changes.outputs['frontend'] }}" ;;
            *)                      CHANGED="false" ;;
          esac

          if [ "$CHANGED" == "true" ]; then
            echo "push=true" >> $GITHUB_OUTPUT
            echo "Will push $SERVICE"
          else
            echo "push=false" >> $GITHUB_OUTPUT
            echo "Skip $SERVICE (not changed)"
          fi

      - name: Download image artifact
        if: steps.should-push.outputs.push == 'true'
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp
        continue-on-error: true

      - name: Check artifact exists
        if: steps.should-push.outputs.push == 'true'
        id: check-artifact
        run: |
          if [ -f "/tmp/${{ matrix.service }}.tar" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No artifact found for ${{ matrix.service }}, skipping push"
          fi

      - name: Load image into Docker daemon
        if: steps.should-push.outputs.push == 'true' && steps.check-artifact.outputs.exists == 'true'
        run: docker load -i /tmp/${{ matrix.service }}.tar

      - name: Log in to GitHub Container Registry
        if: steps.should-push.outputs.push == 'true' && steps.check-artifact.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        if: steps.should-push.outputs.push == 'true' && steps.check-artifact.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short,value=${{ github.event.workflow_run.head_sha }}

      - name: Tag and push
        if: steps.should-push.outputs.push == 'true' && steps.check-artifact.outputs.exists == 'true'
        run: |
          LOADED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ matrix.service }}" | head -1)
          echo "Loaded image: $LOADED_IMAGE"

          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            docker tag "$LOADED_IMAGE" "$tag"
            docker push "$tag"
            echo "Pushed: $tag"
          done