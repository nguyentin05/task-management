name: CD

on:
  workflow_run:
    workflows: [ "Release" ]
    branches: [ master ]
    types: [ completed ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  detect-changes:
    name: Read Changes from CI
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      authentication-service: ${{ steps.parse.outputs.authentication-service }}
      profile-service: ${{ steps.parse.outputs.profile-service }}
      task-service: ${{ steps.parse.outputs.task-service }}
      comment-service: ${{ steps.parse.outputs.comment-service }}
      notification-service: ${{ steps.parse.outputs.notification-service }}
      api-gateway: ${{ steps.parse.outputs.api-gateway }}
      frontend: ${{ steps.parse.outputs.frontend }}
    permissions:
      contents: read
    steps:
      - name: Download changes artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: detected-changes
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Parse JSON to variables
        id: parse
        run: |
          if [ ! -f changes.json ]; then
            echo "No changes artifact found, all services unchanged"
            for svc in authentication-service profile-service task-service comment-service notification-service api-gateway frontend; do
              echo "${svc}=false" >> $GITHUB_OUTPUT
            done
            exit 0
          fi
          for svc in authentication-service profile-service task-service comment-service notification-service api-gateway frontend; do
            echo "${svc}=$(jq -r ".[\"${svc}\"]" changes.json)" >> $GITHUB_OUTPUT
          done

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.result == 'success'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: authentication-service
            changed: ${{ needs.detect-changes.outputs['authentication-service'] }}
            context: ./backend
            dockerfile: backend/authentication-service/Dockerfile
          - service: profile-service
            changed: ${{ needs.detect-changes.outputs['profile-service'] }}
            context: ./backend
            dockerfile: backend/profile-service/Dockerfile
          - service: task-service
            changed: ${{ needs.detect-changes.outputs['task-service'] }}
            context: ./backend
            dockerfile: backend/task-service/Dockerfile
          - service: comment-service
            changed: ${{ needs.detect-changes.outputs['comment-service'] }}
            context: ./backend
            dockerfile: backend/comment-service/Dockerfile
          - service: notification-service
            changed: ${{ needs.detect-changes.outputs['notification-service'] }}
            context: ./backend
            dockerfile: backend/notification-service/Dockerfile
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
            context: ./backend
            dockerfile: backend/api-gateway/Dockerfile
          - service: frontend
            changed: ${{ needs.detect-changes.outputs['frontend'] }}
            context: ./frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Skip if not changed
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping build."

      - name: Checkout code
        if: matrix.changed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Get release version
        if: matrix.changed == 'true'
        id: version
        run: |
          git fetch --tags
          VERSION=$(git describe --tags --abbrev=0)
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags (only latest and version)
        if: matrix.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build image
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          outputs: type=docker,dest=/tmp/${{ matrix.service }}.tar

      - name: Upload image artifact
        if: matrix.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/${{ matrix.service }}.tar
          retention-days: 1

      - name: Save version to artifact
        if: matrix.changed == 'true'
        run: echo "${{ steps.version.outputs.tag }}" > /tmp/version-${{ matrix.service }}.txt

      - name: Upload version artifact
        if: matrix.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: version-${{ matrix.service }}
          path: /tmp/version-${{ matrix.service }}.txt
          retention-days: 1

  push-images:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ detect-changes, build-images ]
    if: always() && needs.build-images.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - authentication-service
          - profile-service
          - task-service
          - comment-service
          - notification-service
          - api-gateway
          - frontend

    steps:
      - name: Checkout code (to get tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current and previous release versions
        id: versions
        run: |
          git fetch --tags
          CURRENT_VERSION=$(git describe --tags --abbrev=0)
          echo "current=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          PREVIOUS_VERSION=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous=${PREVIOUS_VERSION}" >> $GITHUB_OUTPUT

      - name: Determine if service changed
        id: changed
        run: |
          SERVICE="${{ matrix.service }}"
          case "$SERVICE" in
            authentication-service) CHANGED="${{ needs.detect-changes.outputs['authentication-service'] }}" ;;
            profile-service)        CHANGED="${{ needs.detect-changes.outputs['profile-service'] }}" ;;
            task-service)           CHANGED="${{ needs.detect-changes.outputs['task-service'] }}" ;;
            comment-service)        CHANGED="${{ needs.detect-changes.outputs['comment-service'] }}" ;;
            notification-service)   CHANGED="${{ needs.detect-changes.outputs['notification-service'] }}" ;;
            api-gateway)            CHANGED="${{ needs.detect-changes.outputs['api-gateway'] }}" ;;
            frontend)               CHANGED="${{ needs.detect-changes.outputs['frontend'] }}" ;;
            *)                      CHANGED="false" ;;
          esac
          echo "value=${CHANGED}" >> $GITHUB_OUTPUT
          if [ "$CHANGED" == "true" ]; then
            echo "Will push $SERVICE (changed)"
          else
            echo "Will retag $SERVICE (unchanged)"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image artifact (changed service)
        if: steps.changed.outputs.value == 'true'
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp

      - name: Load and push (changed service)
        if: steps.changed.outputs.value == 'true'
        run: |
          docker load -i /tmp/${{ matrix.service }}.tar
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}"
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ steps.versions.outputs.current }}"

      - name: Pull and retag existing image (unchanged service)
        if: steps.changed.outputs.value != 'true'
        run: |
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}"
          TAG_TO_PULL="${{ steps.versions.outputs.previous }}"
          if [ -z "$TAG_TO_PULL" ] || ! docker pull "${IMAGE_NAME}:${TAG_TO_PULL}" 2>/dev/null; then
            docker pull "${IMAGE_NAME}:latest"
            TAG_TO_PULL="latest"
          fi
          docker tag "${IMAGE_NAME}:${TAG_TO_PULL}" "${IMAGE_NAME}:${{ steps.versions.outputs.current }}"
          docker push "${IMAGE_NAME}:${{ steps.versions.outputs.current }}"
          echo "Retagged ${IMAGE_NAME}:${TAG_TO_PULL} to ${IMAGE_NAME}:${{ steps.versions.outputs.current }}"