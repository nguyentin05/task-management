name: CI

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'frontend/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      authentication-service: ${{ steps.filter.outputs['authentication-service'] }}
      profile-service: ${{ steps.filter.outputs['profile-service'] }}
      task-service: ${{ steps.filter.outputs['task-service'] }}
      api-gateway: ${{ steps.filter.outputs['api-gateway'] }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            authentication-service:
              - 'backend/authentication-service/**'
            profile-service:
              - 'backend/profile-service/**'
            task-service:
              - 'backend/task-service/**'
            api-gateway:
              - 'backend/api-gateway/**'

  format-code:
    name: Auto Format Code
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs['any-backend'] == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Spotless
        working-directory: ./backend
        run: mvn spotless:apply --batch-mode --no-transfer-progress

      - name: Auto commit by bot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(project): auto-format code by Spotless [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

  build-and-test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ detect-changes, format-code ]
    if: |
      always() && 
      needs.detect-changes.result == 'success' &&
      (needs.detect-changes.outputs['authentication-service'] == 'true' ||
       needs.detect-changes.outputs['profile-service'] == 'true' ||
       needs.detect-changes.outputs['task-service'] == 'true' ||
       needs.detect-changes.outputs['api-gateway'] == 'true')

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: authentication-service
            changed: ${{ needs.detect-changes.outputs['authentication-service'] }}
          - service: profile-service
            changed: ${{ needs.detect-changes.outputs['profile-service'] }}
          - service: task-service
            changed: ${{ needs.detect-changes.outputs['task-service'] }}
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
  - name: Upload Test Results
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: test-results-${{ matrix.service }}
      path: backend/${{ matrix.service }}/target/surefire-reports/TEST-*.xml
      retention-days: 1

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ detect-changes, format-code, build-and-test ]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-results
          merge-multiple: true

      - name: Calculate Stats and Generate Summary
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import glob, os

          total, failed, errors, skipped = 0, 0, 0, 0

          # Tìm và đọc tất cả các file báo cáo của Maven
          for file in glob.glob('test-results/TEST-*.xml', recursive=True):
              try:
                  root = ET.parse(file).getroot()
                  if root.tag == 'testsuite':
                      total += int(root.attrib.get('tests', 0))
                      failed += int(root.attrib.get('failures', 0))
                      errors += int(root.attrib.get('errors', 0))
                      skipped += int(root.attrib.get('skipped', 0))
              except:
                  pass

          # Bỏ qua các bài test bị @Disabled hoặc @Ignore
          actual_total = total - skipped 
          actual_failed = failed + errors
          passed = actual_total - actual_failed

          # Tránh lỗi chia cho 0 nếu không có test nào chạy
          pct = round((passed / actual_total) * 100, 2) if actual_total > 0 else 0

          # Viết Markdown
          summary = f'''## 📊 Báo Cáo CI/CD

          ### 🎯 Thống Kê Test (Unit & Integration)
          | 🧪 Chỉ Số | 🔢 Số Lượng |
          |---------|-------|
          | **Tổng số bài Test** | **{actual_total}** |
          | **Pass** ✅ | {passed} |
          | **Fail** ❌ | {actual_failed} |
          | **Tỉ lệ Pass** 📈 | **{pct}%** |

          ---

          ### ⚙️ Trạng Thái Các Chặng (Stages)
          | Stage | Result |
          |-------|--------|
          | Format | ${{ needs.format-code.result }} |
          | Test Matrix | ${{ needs.build-and-test.result }} |

          ---

          ### 🚀 Dịch Vụ Có Thay Đổi (Triggered)
          | Service | Changed |
          |---------|---------|
          | authentication-service | ${{ needs.detect-changes.outputs['authentication-service'] }} |
          | profile-service        | ${{ needs.detect-changes.outputs['profile-service'] }} |
          | task-service           | ${{ needs.detect-changes.outputs['task-service'] }} |
          | api-gateway            | ${{ needs.detect-changes.outputs['api-gateway'] }} |
          '''

          # Bắn ra bảng tóm tắt của GitHub
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as f:
              f.write(summary)
          "