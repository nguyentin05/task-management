name: CI

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'frontend/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      authentication-service: ${{ steps.filter.outputs['authentication-service'] }}
      profile-service: ${{ steps.filter.outputs['profile-service'] }}
      task-service: ${{ steps.filter.outputs['task-service'] }}
      comment-service: ${{ steps.filter.outputs['comment-service'] }}
      api-gateway: ${{ steps.filter.outputs['api-gateway'] }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            authentication-service:
              - 'backend/authentication-service/**'
              - 'backend/pom.xml'
            profile-service:
              - 'backend/profile-service/**'
              - 'backend/pom.xml'
            task-service:
              - 'backend/task-service/**'
              - 'backend/pom.xml'
            comment-service:
              - 'backend/comment-service/**'
              - 'backend/pom.xml'
            api-gateway:
              - 'backend/api-gateway/**'
              - 'backend/pom.xml'

  format-code:
    name: Auto Format Code
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs['authentication-service'] == 'true' ||
      needs.detect-changes.outputs['profile-service'] == 'true' ||
      needs.detect-changes.outputs['task-service'] == 'true' ||
      needs.detect-changes.outputs['comment-service'] == 'true' ||
      needs.detect-changes.outputs['api-gateway'] == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Spotless
        working-directory: ./backend
        run: mvn spotless:apply --batch-mode --no-transfer-progress

      - name: Auto commit by bot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(project): auto-format code by Spotless [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

  build-and-test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ detect-changes, format-code ]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.detect-changes.outputs['authentication-service'] == 'true' ||
       needs.detect-changes.outputs['profile-service'] == 'true' ||
       needs.detect-changes.outputs['task-service'] == 'true' ||
       needs.detect-changes.outputs['comment-service'] == 'true' ||
       needs.detect-changes.outputs['api-gateway'] == 'true')

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: authentication-service
            changed: ${{ needs.detect-changes.outputs['authentication-service'] }}
          - service: profile-service
            changed: ${{ needs.detect-changes.outputs['profile-service'] }}
          - service: task-service
            changed: ${{ needs.detect-changes.outputs['task-service'] }}
          - service: comment-service
            changed: ${{ needs.detect-changes.outputs['comment-service'] }}
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}

    steps:
      - name: Skip if not changed
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping."

      - name: Checkout code
        if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        if: matrix.changed == 'true'
        working-directory: ./backend/${{ matrix.service }}
        run: mvn verify --batch-mode --no-transfer-progress

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ detect-changes, format-code, build-and-test ]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services detected:** ${{ needs.detect-changes.outputs.services-list }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY