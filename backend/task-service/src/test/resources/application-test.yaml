spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  rabbitmq:
    host: localhost
    port: 5762
    username: guest
    password: guest

services:
  auth:
    url: localhost:8080
  profile:
    url: localhost:8081